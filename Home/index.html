<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeLettuce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #4ade80;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
    }

    /* Layout */
    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    /* Header */
    header {
      margin-bottom: 48px;
    }

    .wordmark {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .wordmark span {
      color: var(--muted);
      font-weight: 400;
    }

    /* Apps grid */
    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .app-card:hover {
      border-color: #444;
      background: #202020;
    }

    .app-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }

    .app-info { min-width: 0; }

    .app-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding-top: 48px;
      font-size: 0.72rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="wordmark">HomeLettuce<span> · panel</span></div>
    </header>

    <main class="apps">
      <a href="/vantop-dashboard/" class="app-card">
        <div class="app-icon">🚗</div>
        <div class="app-info">
          <div class="app-name">Vantop</div>
          <div class="app-desc">Panel de transporte</div>
        </div>
      </a>

      <!-- Agrega aquí nuevas apps cuando las tengas -->
    </main>

    <footer>home-lettuce.com</footer>
  </div>
</body>
</html>
