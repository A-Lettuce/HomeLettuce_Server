<style>
  :root {
    --accent: 153 72% 76%;
    --accent-strong: 153 38% 42%;
    --accent-tint: 153 70% 95%;
  }
  .palette-sage    { --accent: 150 38% 76%; --accent-strong: 152 30% 38%; --accent-tint: 150 50% 95%; }
  .palette-lavender{ --accent: 265 45% 82%; --accent-strong: 263 32% 50%; --accent-tint: 265 55% 96%; }
  .palette-peach   { --accent:  22 78% 84%; --accent-strong:  20 55% 50%; --accent-tint:  22 80% 96%; }
  .palette-sky     { --accent: 212 62% 83%; --accent-strong: 212 46% 46%; --accent-tint: 212 68% 95%; }
  .palette-rose    { --accent: 342 65% 84%; --accent-strong: 342 48% 52%; --accent-tint: 342 72% 96%; }
  .palette-sand    { --accent:  42 72% 82%; --accent-strong:  40 50% 46%; --accent-tint:  42 78% 96%; }
  .palette-mint    { --accent: 172 48% 78%; --accent-strong: 172 36% 42%; --accent-tint: 172 52% 95%; }
  .palette-coral   { --accent:   8 75% 82%; --accent-strong:   8 55% 50%; --accent-tint:   8 80% 96%; }

  .dark.palette-sage    { --accent: 150 40% 70%; --accent-strong: 150 38% 64%; --accent-tint: 150 25% 22%; }
  .dark.palette-lavender{ --accent: 265 50% 78%; --accent-strong: 265 45% 75%; --accent-tint: 265 25% 24%; }
  .dark.palette-peach   { --accent:  22 78% 78%; --accent-strong:  20 70% 72%; --accent-tint:  22 35% 22%; }
  .dark.palette-sky     { --accent: 212 55% 73%; --accent-strong: 212 50% 69%; --accent-tint: 212 28% 22%; }
  .dark.palette-rose    { --accent: 342 60% 74%; --accent-strong: 342 56% 70%; --accent-tint: 342 28% 24%; }
  .dark.palette-sand    { --accent:  42 65% 72%; --accent-strong:  42 60% 66%; --accent-tint:  42 32% 20%; }
  .dark.palette-mint    { --accent: 172 44% 68%; --accent-strong: 172 40% 64%; --accent-tint: 172 24% 22%; }
  .dark.palette-coral   { --accent:   8 68% 74%; --accent-strong:   8 62% 68%; --accent-tint:   8 32% 22%; }

  html, body, #root { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: #fbfbf8;
    color: #1f2421;
  }
  .dark body { background: #16191a; color: #e7e9e6; }
  body { background: transparent; }

  .bg-accent      { background-color: hsl(var(--accent)); }
  .bg-accent-tint { background-color: hsl(var(--accent-tint)); }
  .text-accent    { color: hsl(var(--accent-strong)); }
  .ring-accent    { --tw-ring-color: hsl(var(--accent)); }
  .border-accent  { border-color: hsl(var(--accent)); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
  .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); background-clip: content-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.18); background-clip: content-box; border: 2px solid transparent; }

  /* Ocultar scrollbar manteniendo el scroll (tabs / carruseles horizontales en móvil) */
  .hl-noscrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .hl-noscrollbar::-webkit-scrollbar { display: none; width: 0; height: 0; }

  .route-fade { animation: rf .35s ease both; }
  @keyframes rf { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }

  @keyframes hlSheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes hlFade    { from { opacity: 0; } to { opacity: 1; } }
  @keyframes hlPop     { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  .hl-anim-fade  { animation: hlFade .2s ease; }
  .hl-anim-pop   { animation: hlPop .18s ease; }
  .hl-anim-sheet { animation: hlSheetUp .3s cubic-bezier(.32,.72,0,1); }
  .hl-modal-anim { animation: hlSheetUp .3s cubic-bezier(.32,.72,0,1); }
  @media (min-width: 640px) { .hl-modal-anim { animation: hlPop .18s ease; } }
  @media (prefers-reduced-motion: reduce) {
    .route-fade, .hl-anim-fade, .hl-anim-pop, .hl-anim-sheet, .hl-modal-anim { animation: none !important; }
  }

  :focus { outline: none; }
  :focus-visible { outline: 2px solid hsl(var(--accent-strong)); outline-offset: 2px; border-radius: 12px; }

  [data-tweaks-host] { --dc-inv-zoom: 1; }
</style>
