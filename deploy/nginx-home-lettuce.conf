server {
    listen 80;
    server_name home-lettuce.com;

    # Página Home (HTML estático)
    root /home/vantop/HomeLettuce/Home;

    # Sólo escucha en loopback — cloudflared se conecta localmente
    # Si NGINX sólo corre en 127.0.0.1:80, cambia listen arriba

    location = / {
        try_files /index.html =404;
    }

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
    }

    # Redirect bare path sin trailing slash
    location = /vantop-dashboard {
        return 301 /vantop-dashboard/;
    }

    # Vantop Dashboard — strip el prefijo antes de pasar a Flask
    location /vantop-dashboard/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     off;

        # Timeouts razonables para una Pi
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
