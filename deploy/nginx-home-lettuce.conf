server {
    listen 80;
    server_name home-lettuce.com;

    root /home/vantop/HL/HomeLettuce_Server/dashboard;

    location = / {
        try_files /index.html =404;
    }

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
    }

    # Archivos estáticos de la UI (JSX compilado por Babel Standalone en browser)
    location ~* \.(jsx|js|css|png|jpg|svg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Redirect bare path sin trailing slash
    location = /vantop-dashboard {
        return 301 /vantop-dashboard/;
    }

    # Vantop Dashboard — ^~ evita que la regex de estáticos intercepte estas rutas
    location ^~ /vantop-dashboard/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
